name: Bug report
description: Report a problem with the action.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow step using the action
      description: Paste the relevant `uses:` block (mask secrets).
      render: yaml
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Action version
      placeholder: "v1 / v1.2.3 / commit SHA"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs (mask any secret).
      render: shell
